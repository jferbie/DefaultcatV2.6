<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DefaultCab v2.6 (dark)</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="topbar">
    <button id="connectBtn">Connect</button>

    <div id="tabs">
      <button id="runTab" class="active">Run</button>
    </div>

    <div id="status">Disconnected</div>
    <div id="deviceInfo" style="font-size: 0.85em; color: #999;">Device: <span id="deviceName">—</span></div>
    <div id="locoName">Loco: Default</div>
  </div>

  <div id="main">

    <!-- RUN SCREEN -->
    <div id="runScreen">

      <!-- LEFT COLUMN (70%) -->
      <div id="leftCol">
        <div class="panel-wrap">
          <div class="card-frame throttle-frame">
            <div class="throttle-panel-main">
            <div class="throttle-area">
              <div class="throttle-slider-wrap">
                <input type="range" id="throttle" min="0" max="100" value="0" aria-orientation="vertical">
                <div class="throttle-text">Throttle: <span id="throttleVal">0%</span></div>
              </div>

              <div class="throttle-info">
                <div class="dial-wrap">
                  <canvas id="throttleDial" width="260" height="130" aria-hidden="true"></canvas>
                  <div class="dial-labels">
                    <div>0</div>
                    <div id="throttlePercent">0%</div>
                    <div>100</div>
                  </div>
                </div>

                <div class="speed-block">
                  <div class="speed-label">SPEED DIAL</div>
                  <div id="speed" class="speed-value">0%</div>
                  <div class="throttle-output">THROTTLE OUTPUT: <span id="throttleOutput">0%</span></div>
                </div>

                <div class="analog-wrap-inline">
                  <h3>Analog Indicator</h3>
                  <div id="analog">0%</div>
                </div>
              </div>
            </div>

            <div class="controls-area">
              <div class="dir-buttons">
                <div class="btn-frame seg-frame">
                  <button id="forwardBtn" class="dir-btn seg-btn" title="Forward" aria-label="Forward">FOR</button>
                  <button id="reverseBtn" class="dir-btn seg-btn" title="Reverse" aria-label="Reverse">REV</button>
                </div>
              </div>

              <div class="stop-wrap">
                <div class="btn-frame stop-frame"><button id="stopBtn" class="stop-btn">STOP</button></div>
              </div>
            </div>
            </div>
          </div>
        </div>
      </div>

      <!-- RIGHT COLUMN (30%) -->
      <div id="rightCol">
        <div class="card-frame">
          <h3>Accessories</h3>
          <div class="accessory-row">
            <div class="btn-frame"><button id="a1Btn" class="accBtn off">A1</button></div>
            <div class="btn-frame"><button id="a2Btn" class="accBtn off">A2</button></div>
          </div>
        </div>

        <div class="card-frame">
          <h3>Sound (future)</h3>
          <div>(reserved)</div>
        </div>

        <div class="card-frame">
          <h3>Settings</h3>
          <button id="openSettingsBtn" class="settings-btn">Open Settings</button>
        </div>
      </div>

    </div>

  </div>

  <!-- SETTINGS MODAL -->
  <div id="settingsModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Settings</h2>
        <button id="closeSettingsBtn" class="close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <div class="settingRow">
          <label for="locoNameInput">Loco Name</label>
          <input type="text" id="locoNameInput" maxlength="20" value="Default" placeholder="Enter loco name">
        </div>

        <div class="settingRow">
          <label>Boost Power: <span id="boostPowerVal">50</span>%</label><br>
          <input type="range" id="boostPower" min="0" max="100" value="50">
        </div>

        <div class="settingRow">
          <label>Boost Duration: <span id="boostDurationVal">150</span>ms</label><br>
          <input type="range" id="boostDuration" min="0" max="500" value="150">
        </div>

        <div class="settingRow">
          <label>Dir Change Delay: <span id="dirDelayVal">200</span>ms</label><br>
          <input type="range" id="dirDelay" min="0" max="1000" value="200">
        </div>
      </div>
      <div class="modal-footer">
        <button id="saveSettings" class="save-btn">Save Settings</button>
        <button id="modalCloseBtn" class="cancel-btn">Close</button>
      </div>
    </div>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
